<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>COMPARUM</title>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#0b1220;color:#e5eefc}
    .wrap{max-width:1200px;margin:0 auto;padding:24px}
    .box{border:2px dashed #5aa4ff;border-radius:18px;padding:24px;background:#101b31}
    .drop{margin:20px 0;padding:40px;border:2px dashed rgba(255,255,255,.15);border-radius:14px;text-align:center}
    .card{margin-top:20px;border:2px solid #12a87a;border-radius:14px;background:#22314d;padding:18px}
    .btn{display:inline-block;margin-top:12px;padding:10px 16px;border-radius:10px;background:#1d4ed8;color:#fff;text-decoration:none}
    pre{white-space:pre-wrap;background:#0b1220;padding:14px;border-radius:10px;overflow:auto}
    input{display:block;margin:12px 0}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>COMPARUM</h1>
    <p>Comparativa Inteligente de Cotizaciones</p>

    <div class="box">
      <h2>Análisis Inteligente de Cotizaciones</h2>
      <div class="drop">
        <div>Arrastra un PDF o haz clic para seleccionar</div>
        <input id="file" type="file" accept=".pdf" />
        <button id="btn">Enviar a analizar</button>
      </div>

      <div class="card" id="panel" style="display:none">
        <strong>✓ Análisis Completado por IA</strong>
        <pre id="out"></pre>
      </div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById('file');
    const btn = document.getElementById('btn');
    const panel = document.getElementById('panel');
    const out = document.getElementById('out');

    btn.addEventListener('click', async () => {
      const file = fileInput.files[0];
      if (!file) {
        alert('Elegí un PDF');
        return;
      }

      const fd = new FormData();
      fd.append('file', file);

      const r = await fetch('/api/analizar-cotizacion', { method: 'POST', body: fd });
      const data = await r.json();

      const parsed = data.parsed || data;
      panel.style.display = 'block';
      out.textContent = JSON.stringify(parsed, null, 2);
    });
  </script>
</body>
</html>
