<!doctype html>
<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>COMPARUM</title><style>body{margin:0;font-family:Arial,sans-serif;background:#0b1220;color:#e5eefc}.wrap{max-width:1200px;margin:0 auto;padding:24px}.box{border:2px dashed #5aa4ff;border-radius:18px;padding:24px;background:#101b31}.drop{margin:20px 0;padding:40px;border:2px dashed rgba(255,255,255,.15);border-radius:14px;text-align:center}.card{margin-top:20px;border:2px solid #12a87a;border-radius:14px;background:#22314d;padding:18px}pre{white-space:pre-wrap;background:#0b1220;padding:14px;border-radius:10px;overflow:auto}input,button{margin-top:12px}</style></head><body><div class="wrap"><h1>COMPARUM</h1><p>Comparativa Inteligente de Cotizaciones</p><div class="box"><h2>Análisis Inteligente de Cotizaciones</h2><div class="drop"><div>Seleccioná un PDF</div><input id="file" type="file" accept=".pdf"><br><button id="btn">Enviar a analizar</button></div><div class="card" id="panel" style="display:none"><strong>✓ Análisis Completado por IA</strong><pre id="out"></pre></div></div></div><script>btn.onclick=async()=>{const f=file.files[0];if(!f)return alert('Elegí un PDF');const fd=new FormData();fd.append('file',f);const r=await fetch('/api/analizar-cotizacion',{method:'POST',body:fd});const d=await r.json();panel.style.display='block';out.textContent=JSON.stringify(d.parsed||d,null,2)}</script></body></html>
